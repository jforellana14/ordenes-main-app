<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Transportes JDA</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 30px;
    }

    h1 { margin-bottom: 20px; }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 12px;
    }

    button:hover { opacity: 0.9; }

    .delete-btn { background: #dc2626; }
    .secondary-btn { background: #475569; }
    .success-btn { background: #16a34a; }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 20px;
      width: 300px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111827;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #374151;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th { background: #1e293b; }

    a {
      color: #60a5fa;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    #serverStatus {
      margin-bottom: 20px;
      color: #93c5fd;
    }

    .hidden { display: none; }

    .tabs {
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <h1>Transportes JDA</h1>

  <div class="tabs">
    <button onclick="showSection('boletas')">Boletas</button>
    <button onclick="showSection('pilotos')">Pilotos</button>
    <button onclick="wakeServer()" class="secondary-btn">Levantar servidor</button>
  </div>

  <p id="serverStatus">Servidor: verificando...</p>

  <section id="boletasSection">
    <h2>Registro de Órdenes de Viaje</h2>

    <input id="searchInput" placeholder="Buscar boleta..." oninput="filterTable()" />

    <br />

    <button onclick="loadDocuments()">Actualizar registros</button>
    <button onclick="downloadExcel()">Descargar Excel</button>

    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Origen</th>
          <th>Destino</th>
          <th>Producto</th>
          <th>Piloto</th>
          <th>No. Orden</th>
          <th>Peso</th>
          <th>No. Constancia</th>
          <th>Imagen</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="documentsTable"></tbody>
    </table>
  </section>

  <section id="pilotosSection" class="hidden">
    <h2>Catálogo de Pilotos</h2>

    <input id="pilotNameInput" placeholder="Nombre del piloto" />

    <br />

    <button onclick="createPilot()" class="success-btn">Agregar piloto</button>
    <button onclick="loadPilots()">Actualizar pilotos</button>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Estado</th>
          <th>Fecha creación</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="pilotsTable"></tbody>
    </table>
  </section>

  <script>
    const API_URL = "https://ocr-backend-c3gk.onrender.com";

    let documents = [];
    let pilots = [];

    function showSection(section) {
      document.getElementById("boletasSection").classList.add("hidden");
      document.getElementById("pilotosSection").classList.add("hidden");

      if (section === "boletas") {
        document.getElementById("boletasSection").classList.remove("hidden");
        loadDocuments();
      }

      if (section === "pilotos") {
        document.getElementById("pilotosSection").classList.remove("hidden");
        loadPilots();
      }
    }

    async function wakeServer() {
      const status = document.getElementById("serverStatus");

      try {
        status.textContent = "Servidor: despertando...";

        const response = await fetch(`${API_URL}/`);

        if (response.ok) {
          status.textContent = "Servidor: conectado";
          await loadDocuments();
          await loadPilots();
        } else {
          status.textContent = "Servidor: respondió con error";
        }

      } catch (error) {
        status.textContent = "Servidor: intentando de nuevo...";

        setTimeout(async () => {
          try {
            const response = await fetch(`${API_URL}/`);

            if (response.ok) {
              status.textContent = "Servidor: conectado";
              await loadDocuments();
              await loadPilots();
            } else {
              status.textContent = "Servidor: error";
            }

          } catch (error) {
            status.textContent = "Servidor: no disponible";
          }
        }, 15000);
      }
    }

    async function loadDocuments() {
      try {
        const response = await fetch(`${API_URL}/documents`);

        if (!response.ok) {
          alert(`Error servidor: ${response.status}`);
          return;
        }

        documents = await response.json();
        renderDocuments(documents);

      } catch (error) {
        alert(`No conecta con servidor: ${error.message}`);
      }
    }

    function renderDocuments(data) {
      const tbody = document.getElementById("documentsTable");
      tbody.innerHTML = "";

      data.forEach(doc => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${doc.fecha || ""}</td>
          <td>${doc.origen || ""}</td>
          <td>${doc.destino || ""}</td>
          <td>${doc.producto || ""}</td>
          <td>${doc.piloto || ""}</td>
          <td>${doc.no_orden_carga || ""}</td>
          <td>${doc.peso_entregado || ""}</td>
          <td>${doc.no_constancia_viaje || ""}</td>
          <td>
            ${
              doc.image_path
                ? `<a href="${doc.image_path}" target="_blank">Ver imagen</a>`
                : ""
            }
          </td>
          <td>
            <button onclick="editDocument(${doc.id})">Editar</button>
            <button class="delete-btn" onclick="deleteDocument(${doc.id})">Eliminar</button>
          </td>
        `;

        tbody.appendChild(row);
      });
    }

    function filterTable() {
      const query = document.getElementById("searchInput").value.toUpperCase();

      const filtered = documents.filter(doc => {
        return JSON.stringify(doc).toUpperCase().includes(query);
      });

      renderDocuments(filtered);
    }

    function downloadExcel() {
      window.location.href = `${API_URL}/export/excel`;
    }

    async function editDocument(id) {
      const doc = documents.find(d => d.id === id);
      if (!doc) return;

      const fecha = prompt("Fecha:", doc.fecha || "");
      if (fecha === null) return;

      const origen = prompt("Origen:", doc.origen || "");
      if (origen === null) return;

      const destino = prompt("Destino:", doc.destino || "");
      if (destino === null) return;

      const producto = prompt("Producto:", doc.producto || "");
      if (producto === null) return;

      const piloto = prompt("Piloto:", doc.piloto || "");
      if (piloto === null) return;

      const no_orden_carga = prompt("No. Orden de Carga:", doc.no_orden_carga || "");
      if (no_orden_carga === null) return;

      const peso_entregado = prompt("Peso Entregado:", doc.peso_entregado || "");
      if (peso_entregado === null) return;

      const no_constancia_viaje = prompt("No. Constancia de Viaje:", doc.no_constancia_viaje || "");
      if (no_constancia_viaje === null) return;

      const payload = {
        fecha,
        origen,
        destino,
        producto,
        piloto,
        no_orden_carga,
        peso_entregado,
        no_constancia_viaje
      };

      try {
        const response = await fetch(`${API_URL}/documents/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          alert("Registro actualizado");
          await loadDocuments();
        } else {
          alert(`Error actualizando registro: ${response.status}`);
        }

      } catch (error) {
        alert(`No se pudo actualizar: ${error.message}`);
      }
    }

    async function deleteDocument(id) {
      const confirmDelete = confirm("¿Seguro que deseas eliminar este registro?");
      if (!confirmDelete) return;

      try {
        const response = await fetch(`${API_URL}/documents/${id}`, {
          method: "DELETE"
        });

        if (response.ok) {
          alert("Registro eliminado");
          await loadDocuments();
        } else {
          alert(`Error eliminando registro: ${response.status}`);
        }

      } catch (error) {
        alert(`No se pudo eliminar: ${error.message}`);
      }
    }

    async function loadPilots() {
      try {
        const response = await fetch(`${API_URL}/pilots`);

        if (!response.ok) {
          alert(`Error cargando pilotos: ${response.status}`);
          return;
        }

        pilots = await response.json();
        renderPilots(pilots);

      } catch (error) {
        alert(`No conecta con pilotos: ${error.message}`);
      }
    }

    function renderPilots(data) {
      const tbody = document.getElementById("pilotsTable");
      tbody.innerHTML = "";

      data.forEach(pilot => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${pilot.id}</td>
          <td>${pilot.nombre}</td>
          <td>${pilot.activo}</td>
          <td>${pilot.created_at || ""}</td>
          <td>
            <button onclick="editPilot(${pilot.id})">Editar</button>
            <button class="delete-btn" onclick="deletePilot(${pilot.id})">Desactivar</button>
          </td>
        `;

        tbody.appendChild(row);
      });
    }

    async function createPilot() {
      const input = document.getElementById("pilotNameInput");
      const nombre = input.value.trim().toUpperCase();

      if (!nombre) {
        alert("Ingresa el nombre del piloto");
        return;
      }

      try {
        const response = await fetch(`${API_URL}/pilots`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nombre })
        });

        if (response.ok) {
          alert("Piloto agregado");
          input.value = "";
          await loadPilots();
        } else {
          const errorText = await response.text();
          alert(`Error agregando piloto: ${response.status} - ${errorText}`);
        }

      } catch (error) {
        alert(`No se pudo agregar piloto: ${error.message}`);
      }
    }

    async function editPilot(id) {
      const pilot = pilots.find(p => p.id === id);
      if (!pilot) return;

      const nombre = prompt("Nombre del piloto:", pilot.nombre || "");
      if (nombre === null) return;

      try {
        const response = await fetch(`${API_URL}/pilots/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nombre: nombre.toUpperCase() })
        });

        if (response.ok) {
          alert("Piloto actualizado");
          await loadPilots();
        } else {
          alert(`Error actualizando piloto: ${response.status}`);
        }

      } catch (error) {
        alert(`No se pudo actualizar piloto: ${error.message}`);
      }
    }

    async function deletePilot(id) {
      const confirmDelete = confirm("¿Seguro que deseas desactivar este piloto?");
      if (!confirmDelete) return;

      try {
        const response = await fetch(`${API_URL}/pilots/${id}`, {
          method: "DELETE"
        });

        if (response.ok) {
          alert("Piloto desactivado");
          await loadPilots();
        } else {
          alert(`Error desactivando piloto: ${response.status}`);
        }

      } catch (error) {
        alert(`No se pudo desactivar piloto: ${error.message}`);
      }
    }

    wakeServer();
  </script>

</body>
</html>

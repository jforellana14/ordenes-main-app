<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Transportes JDA Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 30px;
    }

    h1, h2 {
      margin-bottom: 15px;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    .danger { background: #dc2626; }
    .success { background: #16a34a; }
    .hidden { display: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111827;
      margin-top: 20px;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #374151;
      font-size: 13px;
      text-align: left;
    }

    th { background: #1e293b; }

    img {
      width: 80px;
      border-radius: 6px;
      cursor: pointer;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    #status {
      color: #93c5fd;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

  <section id="loginSection" class="card">
    <h1>Transportes JDA</h1>
    <h2>Dashboard Login</h2>

    <input id="username" placeholder="Usuario" />
    <input id="password" type="password" placeholder="Contraseña" />

    <button onclick="login()">Ingresar</button>

    <p id="loginMessage"></p>
  </section>

  <section id="dashboardSection" class="hidden">

    <h1>Transportes JDA Dashboard</h1>

    <p id="status">Servidor: verificando...</p>
    <p id="userInfo"></p>

    <button onclick="logout()" class="danger">Salir</button>
    <button onclick="wakeServer()">Levantar servidor</button>
    <button onclick="loadDocuments()">Actualizar</button>
    <button onclick="downloadExcel()" class="success">Descargar Excel filtrado</button>

    <div class="card">
      <h2>Filtros</h2>

      <input id="searchInput" placeholder="Buscar general..." oninput="applyFiltersAndSort()" />

      <select id="pilotFilter" onchange="applyFiltersAndSort()">
        <option value="">Todos los pilotos</option>
      </select>

      <input id="fechaDesdeFilter" type="date" onchange="applyFiltersAndSort()" />
      <input id="fechaHastaFilter" type="date" onchange="applyFiltersAndSort()" />

      <input id="origenFilter" placeholder="Origen" oninput="applyFiltersAndSort()" />
      <input id="destinoFilter" placeholder="Destino" oninput="applyFiltersAndSort()" />
      <input id="productoFilter" placeholder="Producto" oninput="applyFiltersAndSort()" />

      <br />

      <label>Ordenar por:</label>
      <select id="sortField" onchange="applyFiltersAndSort()">
        <option value="fecha">Fecha</option>
        <option value="piloto">Piloto</option>
        <option value="origen">Origen</option>
        <option value="destino">Destino</option>
        <option value="producto">Producto</option>
        <option value="no_orden_carga">No. Orden</option>
        <option value="peso_entregado">Peso</option>
        <option value="created_by_username">Usuario</option>
      </select>

      <select id="sortDirection" onchange="applyFiltersAndSort()">
        <option value="desc">Descendente</option>
        <option value="asc">Ascendente</option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Fecha</th>
          <th>Origen</th>
          <th>Destino</th>
          <th>Producto</th>
          <th>Piloto</th>
          <th>Usuario</th>
          <th>No. Orden</th>
          <th>Peso</th>
          <th>Constancia</th>
          <th>Imagen</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="documentsTable"></tbody>
    </table>

  </section>

  <script>
    const API_URL = "https://ocr-backend-c3gk.onrender.com";

    let token = localStorage.getItem("token") || "";
    let role = localStorage.getItem("role") || "";
    let username = localStorage.getItem("username") || "";
    let documents = [];

    function authHeaders() {
      return {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json"
      };
    }

    function setCurrentMonthDefaultFilters() {
      const now = new Date();

      const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
      const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);

      document.getElementById("fechaDesdeFilter").value =
        firstDay.toISOString().split("T")[0];

      document.getElementById("fechaHastaFilter").value =
        lastDay.toISOString().split("T")[0];
    }

    async function login() {
      const user = document.getElementById("username").value.trim().toUpperCase();
      const pass = document.getElementById("password").value;

      const msg = document.getElementById("loginMessage");
      msg.textContent = "Ingresando...";

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: user,
            password: pass
          })
        });

        if (!response.ok) {
          msg.textContent = "Usuario o contraseña incorrectos";
          return;
        }

        const data = await response.json();

        if (data.role === "PILOTO") {
          msg.textContent = "Los pilotos solo pueden usar la app Android.";
          return;
        }

        token = data.access_token;
        role = data.role;
        username = user;

        localStorage.setItem("token", token);
        localStorage.setItem("role", role);
        localStorage.setItem("username", username);

        setCurrentMonthDefaultFilters();
        showDashboard();

      } catch (error) {
        msg.textContent = "No se pudo conectar con el servidor";
      }
    }

    function logout() {
      localStorage.clear();
      token = "";
      role = "";
      username = "";

      document.getElementById("dashboardSection").classList.add("hidden");
      document.getElementById("loginSection").classList.remove("hidden");
    }

    function showDashboard() {
      document.getElementById("loginSection").classList.add("hidden");
      document.getElementById("dashboardSection").classList.remove("hidden");

      document.getElementById("userInfo").textContent =
        `Usuario: ${username} | Rol: ${role}`;

      wakeServer();
    }

    async function wakeServer() {
      const status = document.getElementById("status");

      try {
        status.textContent = "Servidor: despertando...";

        const response = await fetch(`${API_URL}/`, {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        if (response.ok) {
          status.textContent = "🟢 Servidor conectado";
          await loadDocuments();
        } else {
          status.textContent = "🟡 Servidor respondió con error";
        }

      } catch (error) {
        status.textContent = "🔴 Servidor no disponible";
      }
    }

    async function loadDocuments() {
      try {
        const url = `${API_URL}/documents?sort_by=created_at&sort_order=desc`;

        const response = await fetch(url, {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        if (!response.ok) {
          alert(`Error cargando documentos: ${response.status}`);
          return;
        }

        documents = await response.json();

        fillPilotFilter(documents);
        applyFiltersAndSort();

      } catch (error) {
        alert(`No conecta con servidor: ${error.message}`);
      }
    }

    function fillPilotFilter(data) {
      const select = document.getElementById("pilotFilter");
      const current = select.value;

      const pilots = [...new Set(
        data
          .map(d => d.piloto)
          .filter(Boolean)
      )].sort();

      select.innerHTML = `<option value="">Todos los pilotos</option>`;

      pilots.forEach(pilot => {
        const option = document.createElement("option");
        option.value = pilot;
        option.textContent = pilot;
        select.appendChild(option);
      });

      select.value = current;
    }

    function parseDocumentDate(value) {
      if (!value) return null;

      const parts = value.split("/");

      if (parts.length === 3) {
        return new Date(`${parts[2]}-${parts[1]}-${parts[0]}T00:00:00`);
      }

      return new Date(value);
    }

    function parseDate(value) {
      return parseDocumentDate(value) || new Date(0);
    }

    function applyFiltersAndSort() {
      const query = document.getElementById("searchInput").value.toUpperCase();
      const pilot = document.getElementById("pilotFilter").value.toUpperCase();
      const origen = document.getElementById("origenFilter").value.toUpperCase();
      const destino = document.getElementById("destinoFilter").value.toUpperCase();
      const producto = document.getElementById("productoFilter").value.toUpperCase();

      const fechaDesde = document.getElementById("fechaDesdeFilter").value;
      const fechaHasta = document.getElementById("fechaHastaFilter").value;

      const sortField = document.getElementById("sortField").value;
      const sortDirection = document.getElementById("sortDirection").value;

      let filtered = documents.filter(doc => {
        const docDate = parseDocumentDate(doc.fecha);

        let fechaMatch = true;

        if (fechaDesde && docDate) {
          const desdeDate = new Date(`${fechaDesde}T00:00:00`);
          fechaMatch = fechaMatch && docDate >= desdeDate;
        }

        if (fechaHasta && docDate) {
          const hastaDate = new Date(`${fechaHasta}T23:59:59`);
          fechaMatch = fechaMatch && docDate <= hastaDate;
        }

        const generalMatch =
          JSON.stringify(doc).toUpperCase().includes(query);

        const pilotMatch =
          !pilot || (doc.piloto || "").toUpperCase().includes(pilot);

        const origenMatch =
          !origen || (doc.origen || "").toUpperCase().includes(origen);

        const destinoMatch =
          !destino || (doc.destino || "").toUpperCase().includes(destino);

        const productoMatch =
          !producto || (doc.producto || "").toUpperCase().includes(producto);

        return generalMatch &&
          pilotMatch &&
          origenMatch &&
          destinoMatch &&
          productoMatch &&
          fechaMatch;
      });

      filtered.sort((a, b) => {
        let va = a[sortField] || "";
        let vb = b[sortField] || "";

        if (sortField === "fecha") {
          va = parseDate(va);
          vb = parseDate(vb);
        } else {
          va = va.toString().toUpperCase();
          vb = vb.toString().toUpperCase();
        }

        if (va < vb) return sortDirection === "asc" ? -1 : 1;
        if (va > vb) return sortDirection === "asc" ? 1 : -1;
        return 0;
      });

      renderDocuments(filtered);
    }

    function renderDocuments(data) {
      const tbody = document.getElementById("documentsTable");
      tbody.innerHTML = "";

      data.forEach((doc, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${doc.fecha || ""}</td>
          <td>${doc.origen || ""}</td>
          <td>${doc.destino || ""}</td>
          <td>${doc.producto || ""}</td>
          <td>${doc.piloto || ""}</td>
          <td>${doc.created_by_username || ""}</td>
          <td>${doc.no_orden_carga || ""}</td>
          <td>${doc.peso_entregado || ""}</td>
          <td>${doc.no_constancia_viaje || ""}</td>
          <td>
            ${
              doc.image_path
                ? `<a href="${doc.image_path}" target="_blank">
                    <img src="${doc.image_path}" />
                   </a>`
                : ""
            }
          </td>
          <td>
            <button onclick="editDocument(${doc.id})">Editar</button>
            <button class="danger" onclick="deleteDocument(${doc.id})">Eliminar</button>
          </td>
        `;

        tbody.appendChild(row);
      });
    }

    async function editDocument(id) {
      const doc = documents.find(d => d.id === id);
      if (!doc) return;

      const fecha = prompt("Fecha:", doc.fecha || "");
      if (fecha === null) return;

      const origen = prompt("Origen:", doc.origen || "");
      if (origen === null) return;

      const destino = prompt("Destino:", doc.destino || "");
      if (destino === null) return;

      const producto = prompt("Producto:", doc.producto || "");
      if (producto === null) return;

      const piloto = prompt("Piloto:", doc.piloto || "");
      if (piloto === null) return;

      const no_orden_carga = prompt("No. Orden:", doc.no_orden_carga || "");
      if (no_orden_carga === null) return;

      const peso_entregado = prompt("Peso:", doc.peso_entregado || "");
      if (peso_entregado === null) return;

      const no_constancia_viaje = prompt("Constancia:", doc.no_constancia_viaje || "");
      if (no_constancia_viaje === null) return;

      const payload = {
        fecha,
        origen,
        destino,
        producto,
        piloto,
        no_orden_carga,
        peso_entregado,
        no_constancia_viaje
      };

      const response = await fetch(`${API_URL}/documents/${id}`, {
        method: "PUT",
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        alert("Registro actualizado");
        await loadDocuments();
      } else {
        alert(`Error actualizando: ${response.status}`);
      }
    }

    async function deleteDocument(id) {
      if (!confirm("¿Seguro que deseas eliminar esta boleta?")) return;

      const response = await fetch(`${API_URL}/documents/${id}`, {
        method: "DELETE",
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      if (response.ok) {
        alert("Registro eliminado");
        await loadDocuments();
      } else {
        alert(`Error eliminando: ${response.status}`);
      }
    }

    function buildFilterQuery() {
      const params = new URLSearchParams();

      const piloto = document.getElementById("pilotFilter").value;
      const origen = document.getElementById("origenFilter").value;
      const destino = document.getElementById("destinoFilter").value;
      const producto = document.getElementById("productoFilter").value;

      if (piloto) params.append("piloto", piloto);
      if (origen) params.append("origen", origen);
      if (destino) params.append("destino", destino);
      if (producto) params.append("producto", producto);

      return params.toString();
    }

    function downloadExcel() {
      const query = buildFilterQuery();

      fetch(`${API_URL}/export/excel?${query}`, {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      })
        .then(response => {
          if (!response.ok) {
            throw new Error("No se pudo descargar Excel");
          }

          return response.blob();
        })
        .then(blob => {
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement("a");

          a.href = url;
          a.download = "ordenes_filtradas.xlsx";
          document.body.appendChild(a);
          a.click();
          a.remove();

          window.URL.revokeObjectURL(url);
        })
        .catch(error => {
          alert(error.message);
        });
    }

    if (token && role && role !== "PILOTO") {
      setCurrentMonthDefaultFilters();
      showDashboard();
    }
  </script>

</body>
</html>
